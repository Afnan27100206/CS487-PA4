name: Build and deploy Node.js app to Azure Web App - pa4-27100206

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: cd webapp && npm install && npm run build --if-present
      - uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./webapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-app
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2F1F219EBF90432AAA2CDAB02D871CFF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F7BDA6BA8084A3E9A5FE62FA9BA18E4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AEACA54794454135AA65577907E3CC1E }}
      - uses: azure/webapps-deploy@v3
        with:
          app-name: 'pa4-27100206'
          slot-name: 'Production'
          package: .
